<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabDaily — PI View</title>
<script>
// This page used to have its own separate (simplified) read-only renderer.
// "Share with PI" links now point straight at index.html?gist=..., which
// shows the PI the exact same interface the researcher sees themselves
// instead of a lookalike re-implementation. This redirect just keeps any
// already-shared pi-view.html links working.
var gist = new URLSearchParams(location.search).get('gist');
location.replace('index.html' + (gist ? '?gist=' + encodeURIComponent(gist) : ''));
</script>
</head>
<body>
<p>Redirecting to <a id="fallback-link" href="index.html">LabDaily</a>…</p>
<script>document.getElementById('fallback-link').href = 'index.html' + (gist ? '?gist=' + encodeURIComponent(gist) : '');</script>
</body>
</html>
