<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabDaily — PI View</title>
<style>
:root{--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--success:#16a34a;--warning:#d97706;--danger:#dc2626;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--r:8px;--sh:0 1px 3px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:#1e293b;color:#cbd5e1;display:flex;flex-direction:column;height:100vh;position:fixed;top:0;left:0;overflow-y:auto;z-index:100}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:22px 24px;flex:1}

.sidebar-logo{padding:16px 14px 12px;border-bottom:1px solid #334155}
.sidebar-logo h1{font-size:15px;font-weight:800;color:#f1f5f9}
.sidebar-logo p{font-size:11px;color:#64748b;margin-top:2px}
.nav-group{padding:10px 0 4px}
.nav-label{padding:0 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;margin:1px 6px;border-radius:6px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:all .12s;user-select:none}
.nav-item:hover{background:#334155;color:#e2e8f0}
.nav-item.active{background:#2563eb;color:#fff}
.sidebar-footer{padding:12px;border-top:1px solid #334155;margin-top:auto}
.pi-badge{background:#0f172a;border-radius:8px;padding:8px 10px;font-size:11px;color:#64748b}
.pi-badge strong{display:block;color:#e2e8f0;font-size:12px;margin-bottom:2px}

.topbar-title{font-size:15px;font-weight:700}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ro-badge{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:800;color:var(--text)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--surface);color:var(--text2);border-color:var(--border)}
.btn-secondary:hover{background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:12px}

.fi{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface)}
.ft{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);resize:vertical;min-height:90px;line-height:1.6}
.fl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fg{margin-bottom:12px}

.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.rec-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);cursor:pointer;user-select:none}
.rec-hdr:hover{background:#eef2f7}
.rec-body{padding:16px;display:none}
.rec-body.open{display:block}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.sec-text{font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.7}

.eln-content{border:1px solid var(--border);border-radius:6px;padding:14px 16px;background:var(--surface2);font-size:13px;line-height:1.8;overflow-x:auto}
.eln-content h1{font-size:18px;color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:6px;margin:10px 0 8px}
.eln-content h2{font-size:15px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:3px;margin:14px 0 6px}
.eln-content h3{font-size:13px;color:var(--text2);margin:10px 0 4px}
.eln-content table{border-collapse:collapse;width:100%;margin:10px 0}
.eln-content td,.eln-content th{border:1px solid var(--border);padding:6px 10px;text-align:left}
.eln-content th{background:var(--surface2);font-weight:700}
.eln-content img{max-width:100%;border-radius:6px;margin:8px 0;display:block}
.eln-content p{margin:4px 0}

.file-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;background:var(--surface2)}
.file-icon{font-size:20px;flex-shrink:0}
.file-name{flex:1;font-size:13px;font-weight:500}
.file-meta{font-size:11px;color:var(--text3)}

.pi-box{background:var(--primary-light);border:1px solid #bfdbfe;border-radius:var(--r);padding:14px;margin-top:12px}
.cmt-saved{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:13px;white-space:pre-wrap}
.cmt-meta{font-size:11px;color:var(--text3);margin-bottom:4px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-h{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px}
.cal-d{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surface);color:var(--text3)}
.cal-d.has-rec{background:var(--primary-light);color:var(--primary);font-weight:700;cursor:pointer;border-color:#bfdbfe}
.cal-d.has-rec:hover{background:var(--primary);color:#fff}
.cal-d.today{border:2px solid var(--primary)}
.cal-d.dim{background:transparent;border-color:transparent}

.proj-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.hidden{display:none}
.sm{font-size:12px}.muted{color:var(--text3)}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mt2{margin-top:8px}.mt3{margin-top:12px}
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.g2u{gap:8px}
.xs{font-size:11px}
.p2{padding:8px}

.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#f1f5f9;padding:10px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
.loading{text-align:center;padding:80px 24px;color:var(--text3);font-size:15px}
.err-box{text-align:center;padding:60px 24px}
.err-box h2{color:var(--danger);margin-bottom:8px}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>🔬 LabDaily</h1>
    <p id="sb-name">PI View</p>
  </div>
  <div class="nav-group">
    <div class="nav-label">Lab Notebook</div>
    <div class="nav-item active" onclick="go('today')">📋 Today Summary</div>
    <div class="nav-item" onclick="go('todaydetail')">📝 Today Details</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Data</div>
    <div class="nav-item" onclick="go('projects')">📁 Projects</div>
    <div class="nav-item" onclick="go('calendar')">📅 Records Calendar</div>
    <div class="nav-item" onclick="go('alldata')">🗂 All Data</div>
  </div>
  <div class="sidebar-footer">
    <div class="pi-badge">
      <strong id="sb-pi">PI View</strong>
      <span>Read-only access</span>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="tb-title">Loading…</div>
    <div class="flex ic g2u">
      <span id="tb-pub" class="xs muted"></span>
    </div>
  </div>
  <div class="content" id="content">
    <div class="loading">⏳ Loading records…</div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const params=new URLSearchParams(location.search);
const GIST_ID=params.get('gist');
let DATA=null;
let CUR='today';

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function previewText(s,len){
  const clean=String(s||'').replace(/^#+\s*/,'').replace(/\*\*/g,'').replace(/\s+/g,' ').trim();
  return clean.length>len ? clean.slice(0,len).trim()+'…' : clean;
}
function fd(ds){
  if(!ds)return'';
  return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
}
function fmtSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fileIcon(t){if(!t)return'📄';if(t.startsWith('image/'))return'🖼';if(t.includes('pdf'))return'📕';if(t.includes('word')||t.includes('document'))return'📝';if(t.includes('sheet')||t.includes('excel'))return'📊';return'📄'}

// PI comments: saved in localStorage per gist
function getCmts(){try{return JSON.parse(localStorage.getItem('pi_cmts_'+GIST_ID)||'{}')}catch{return{}}}
function saveCmtLocal(recId,text){const all=getCmts();all[recId]={text,updatedAt:new Date().toISOString()};localStorage.setItem('pi_cmts_'+GIST_ID,JSON.stringify(all))}

function go(page){
  CUR=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const map={today:0,todaydetail:1,projects:2,calendar:3,alldata:4};
  document.querySelectorAll('.nav-item')[map[page]]?.classList.add('active');
  const titles={today:'Today Summary',todaydetail:'Today Details',projects:'Projects',calendar:'Records Calendar',alldata:'All Data'};
  document.getElementById('tb-title').textContent=titles[page]||page;
  const renders={today:renderToday,todaydetail:renderTodayDetail,projects:renderProjects,calendar:renderCalendar,alldata:renderAllData};
  renders[page]?.();
}

async function load(){
  if(!GIST_ID){
    document.getElementById('content').innerHTML=`<div class="err-box"><h2>No link provided</h2><p>Ask your researcher to re-send the PI view link.</p></div>`;
    return;
  }
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`);
    if(!res.ok)throw new Error('Could not load (HTTP '+res.status+')');
    const gist=await res.json();
    const fileObj=gist.files['labdaily-pi.json'];
    if(!fileObj)throw new Error('Data file not found');
    // The Gist API truncates file content around ~1MB; large published
    // datasets (with embedded attachment previews) need the raw file instead.
    let raw=fileObj.content;
    if(fileObj.truncated){
      const rawRes=await fetch(fileObj.raw_url);
      if(!rawRes.ok)throw new Error('Could not load full data (HTTP '+rawRes.status+')');
      raw=await rawRes.text();
    }
    DATA=JSON.parse(raw);
    // Build project map
    DATA._projMap={};
    (DATA.projects||[]).forEach(p=>DATA._projMap[p.id]=p);
    document.getElementById('sb-name').textContent=DATA.researcher||'Researcher';
    document.getElementById('sb-pi').textContent=DATA.pi||'PI';
    document.getElementById('tb-pub').textContent='Published '+new Date(DATA.publishedAt).toLocaleDateString();
    go('today');
  }catch(e){
    document.getElementById('tb-title').textContent='Error';
    document.getElementById('content').innerHTML=`<div class="err-box"><h2>❌ Could not load</h2><p style="color:var(--text2)">${esc(e.message)}</p><p class="sm muted mt3">The link may be expired or the researcher needs to re-publish.</p></div>`;
  }
}

// ── TODAY SUMMARY ──
function renderToday(){
  const td=today();
  const records=(DATA.records||[]).sort((a,b)=>b.date.localeCompare(a.date));
  const rec=records.find(r=>r.date===td)||records[0];
  const pg=document.getElementById('content');
  if(!rec){pg.innerHTML=`<div class="card"><p class="muted">No records published yet.</p></div>`;return}

  const linkedProjs=(rec.projIds||[]).map(id=>DATA._projMap[id]).filter(Boolean);
  const exps=rec.experiments||[];
  const cmts=getCmts();
  const cmt=cmts[rec.id];

  pg.innerHTML=`
    <div class="g2 mb3">
      <div class="card" style="grid-column:1/-1;padding:12px 16px">
        <div class="flex ic jb">
          <div class="flex ic g2u">
            <span style="font-size:22px">📋</span>
            <div>
              <div style="font-weight:700;font-size:15px">${fd(rec.date)}</div>
              <div class="xs muted">${esc(DATA.researcher)} · ${esc(DATA.lab)}</div>
            </div>
          </div>
          <div class="flex ic g2u">
            ${linkedProjs.map(p=>`<span class="badge" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}40"><span class="proj-dot" style="background:${p.color}"></span>${esc(p.name)}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="g2">
      <div>
        <div class="card">
          <div class="card-title">📝 Overall Summary</div>
          <div style="font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--text)">${esc(rec.summary||'No summary recorded.')}</div>
        </div>
        <div class="card">
          <div class="card-title">⚠️ Problems / Troubleshooting</div>
          <div class="sec-text">${esc(rec.problems||'None noted.')}</div>
        </div>
        <div class="card">
          <div class="card-title">➡️ Next Steps</div>
          <div class="sec-text">${esc(rec.nextSteps||'None planned.')}</div>
        </div>
      </div>
      <div>
        ${exps.length?`<div class="card">
          <div class="card-title">🧪 Experiments (${exps.length})</div>
          ${exps.map(e=>{const p=DATA._projMap[e.projId];return`
            <div style="border-left:3px solid ${p?p.color:'var(--border)'};padding:8px 10px;border-radius:0 6px 6px 0;background:var(--surface2);margin-bottom:8px">
              <div style="font-weight:600;font-size:13px">${esc(e.title||'Untitled')}</div>
              ${p?`<div class="xs" style="color:${p.color}">${esc(p.name)}</div>`:''}
              ${e.objective?`<div class="xs muted mt2">Objective: ${esc(e.objective)}</div>`:''}
              ${e.results?`<div class="xs muted">Results: ${esc(e.results)}</div>`:''}
            </div>`}).join('')}
        </div>`:''}

        <!-- PI Comment -->
        <div class="card">
          <div class="card-title" style="color:var(--primary)">💬 PI Comment</div>
          ${cmt?`<div class="cmt-saved"><div class="cmt-meta">Last saved ${new Date(cmt.updatedAt).toLocaleString()}</div>${esc(cmt.text)}</div>`:''}
          <textarea class="ft" id="cmt-today" placeholder="Leave feedback, suggestions, or approval…">${esc(cmt?.text||'')}</textarea>
          <div class="flex g2u mt2">
            <button class="btn btn-primary btn-sm" onclick="submitCmt('${rec.id}','cmt-today','cmt-today-st')">💾 Save</button>
            <button class="btn btn-secondary btn-sm" onclick="emailCmt('${rec.id}','cmt-today','${esc(DATA.email)}','${esc(fd(rec.date))}')">📧 Email</button>
            <span class="xs muted" id="cmt-today-st"></span>
          </div>
        </div>

        <!-- Recent records mini list -->
        <div class="card">
          <div class="card-title">🕐 Recent Records</div>
          ${records.slice(0,5).map(r=>`
            <div class="flex ic jb mb2" style="padding:6px 8px;border-radius:6px;background:var(--surface2);cursor:pointer" onclick="go('calendar')">
              <div>
                <div style="font-size:13px;font-weight:600">${fd(r.date)}</div>
                <div class="xs muted">${esc(previewText(r.summary,60))}</div>
              </div>
              <span style="color:var(--text3);font-size:16px">›</span>
            </div>`).join('')}
          <button class="btn btn-secondary btn-sm mt2" onclick="go('calendar')">View all records →</button>
        </div>
      </div>
    </div>`;
}

// ── TODAY DETAILS ──
function renderTodayDetail(){
  const td=today();
  const records=(DATA.records||[]).sort((a,b)=>b.date.localeCompare(a.date));
  const rec=records.find(r=>r.date===td)||records[0];
  const pg=document.getElementById('content');
  if(!rec||!rec.elnDetail){
    pg.innerHTML=`<div class="card"><p class="muted">No detailed notes published yet for today. Check back after the researcher adds Today Details.</p></div>`;
    return;
  }
  const cmts=getCmts();
  const cmt=cmts[rec.id+'_detail'];
  const linkedProjs=(rec.projIds||[]).map(id=>DATA._projMap[id]).filter(Boolean);

  pg.innerHTML=`
    <div class="card mb3" style="padding:10px 16px">
      <div class="flex ic jb" style="flex-wrap:wrap;gap:8px">
        <div class="flex ic g2u">
          <span class="xs muted">📅 ${fd(rec.date)}</span>
          <span class="xs muted">👤 ${esc(DATA.researcher)}</span>
          <span class="xs muted">🏛 ${esc(DATA.lab)}</span>
        </div>
        <div class="flex ic g2u">
          ${linkedProjs.map(p=>`<span class="badge" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}40">${esc(p.name)}</span>`).join('')}
        </div>
      </div>
    </div>

    <div class="card mb3">
      <div class="card-title">📓 Lab Notebook — ${fd(rec.date)}</div>
      <div class="eln-content">${rec.elnDetail}</div>
    </div>

    <!-- PI Comment on details -->
    <div class="card">
      <div class="card-title" style="color:var(--primary)">💬 PI Comment on Details</div>
      ${cmt?`<div class="cmt-saved"><div class="cmt-meta">Last saved ${new Date(cmt.updatedAt).toLocaleString()}</div>${esc(cmt.text)}</div>`:''}
      <textarea class="ft" id="cmt-detail" placeholder="Comments on the detailed notes…">${esc(cmt?.text||'')}</textarea>
      <div class="flex g2u mt2">
        <button class="btn btn-primary btn-sm" onclick="submitCmt('${rec.id}_detail','cmt-detail','cmt-detail-st')">💾 Save</button>
        <button class="btn btn-secondary btn-sm" onclick="emailCmt('${rec.id}_detail','cmt-detail','${esc(DATA.email)}','Details — ${esc(fd(rec.date))}')">📧 Email</button>
        <span class="xs muted" id="cmt-detail-st"></span>
      </div>
    </div>`;
}

// ── PROJECTS ──
function renderProjects(){
  const projects=DATA.projects||[];
  const records=DATA.records||[];
  const pg=document.getElementById('content');

  if(!projects.length){pg.innerHTML=`<div class="card"><p class="muted">No projects published.</p></div>`;return}

  pg.innerHTML=`
    <div class="g3 mb4">
      ${projects.map(p=>{
        const linked=records.filter(r=>(r.projIds||[]).includes(p.id));
        const exps=records.flatMap(r=>(r.experiments||[]).filter(e=>e.projId===p.id));
        return`<div class="card" style="cursor:pointer;border-top:3px solid ${p.color}" onclick="showProject('${p.id}')">
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${esc(p.name)}</div>
          <div class="xs muted mb3">${esc(p.category||'')}</div>
          <div class="flex g2u">
            <span class="xs muted">${linked.length} records</span>
            <span class="xs muted">${exps.length} experiments</span>
          </div>
          <div style="margin-top:10px">
            <span class="badge" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}40">${p.status||'active'}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div id="proj-detail"></div>`;
}

function showProject(pid){
  const p=DATA._projMap[pid];if(!p)return;
  const records=(DATA.records||[]).filter(r=>(r.projIds||[]).includes(pid)).sort((a,b)=>b.date.localeCompare(a.date));
  const exps=(DATA.records||[]).flatMap(r=>(r.experiments||[]).filter(e=>e.projId===pid).map(e=>({...e,date:r.date})));
  const cmts=getCmts();
  const cmt=cmts['proj_'+pid];
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('proj-detail').innerHTML=`
    <div class="card" style="border-top:3px solid ${p.color}">
      <div class="flex ic jb mb3">
        <div>
          <div style="font-size:16px;font-weight:800">${esc(p.name)}</div>
          <div class="xs muted">${esc(p.description||'')}</div>
        </div>
        <span class="badge" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}40">${p.status||'active'}</span>
      </div>

      <div class="tabs">
        <div class="tab on" onclick="switchTab('pd-rec','pd-exp',this)">Daily Records (${records.length})</div>
        <div class="tab" onclick="switchTab('pd-exp','pd-rec',this)">Experiments (${exps.length})</div>
      </div>

      <div id="pd-rec">
        ${records.length?records.map(r=>{const d=new Date(r.date+'T12:00:00');return`
          <div class="rec-card">
            <div class="rec-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
              <div class="flex ic g2u">
                <div style="text-align:center;min-width:34px">
                  <div style="font-size:15px;font-weight:800;color:${p.color}">${d.getDate()}</div>
                  <div class="xs muted">${MO[d.getMonth()]}</div>
                </div>
                <div>
                  <div style="font-weight:600;font-size:13px">${esc((r.summary||'').slice(0,80))}</div>
                  ${r.nextSteps?`<div class="xs muted">Next: ${esc(r.nextSteps.slice(0,60))}</div>`:''}
                </div>
              </div>
              <span style="color:var(--text3)">▾</span>
            </div>
            <div class="rec-body">
              ${r.summary?`<div class="mb3"><div class="sec-label">Summary</div><div class="sec-text">${esc(r.summary)}</div></div>`:''}
              ${r.problems?`<div class="mb3"><div class="sec-label">Problems</div><div class="sec-text">${esc(r.problems)}</div></div>`:''}
              ${r.nextSteps?`<div class="mb3"><div class="sec-label">Next Steps</div><div class="sec-text">${esc(r.nextSteps)}</div></div>`:''}
              ${r.elnDetail?`<div class="mb3"><div class="sec-label">Detailed Notes</div><div class="eln-content">${r.elnDetail}</div></div>`:''}
              ${piCommentWidget(r.id+'_proj',DATA.email,fd(r.date),cmts)}
            </div>
          </div>`}).join('')
        :'<p class="sm muted">No records linked to this project.</p>'}
      </div>
      <div id="pd-exp" class="hidden">
        ${exps.length?exps.map(e=>{const d=new Date(e.date+'T12:00:00');return`
          <div style="border-left:3px solid ${p.color};padding:10px 12px;border-radius:0 6px 6px 0;background:var(--surface2);margin-bottom:8px">
            <div class="flex ic jb">
              <div style="font-weight:600;font-size:13px">${esc(e.title||'Untitled')}</div>
              <div class="xs muted">${MO[d.getMonth()]} ${d.getDate()}</div>
            </div>
            ${e.objective?`<div class="xs muted mt2">Objective: ${esc(e.objective)}</div>`:''}
            ${e.results?`<div class="xs muted">Results: ${esc(e.results)}</div>`:''}
          </div>`}).join('')
        :'<p class="sm muted">No experiments.</p>'}
      </div>

      <!-- PI comment on project -->
      <div class="pi-box mt3">
        <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px">💬 PI Comment on Project</div>
        ${cmt?`<div class="cmt-saved"><div class="cmt-meta">Last saved ${new Date(cmt.updatedAt).toLocaleString()}</div>${esc(cmt.text)}</div>`:''}
        <textarea class="ft" id="cmt-proj-${pid}" placeholder="Overall feedback on this project…">${esc(cmt?.text||'')}</textarea>
        <div class="flex g2u mt2">
          <button class="btn btn-primary btn-sm" onclick="submitCmt('proj_${pid}','cmt-proj-${pid}','cmt-proj-st-${pid}')">💾 Save</button>
          <button class="btn btn-secondary btn-sm" onclick="emailCmt('proj_${pid}','cmt-proj-${pid}','${esc(DATA.email)}','Project: ${esc(p.name)}')">📧 Email</button>
          <span class="xs muted" id="cmt-proj-st-${pid}"></span>
        </div>
      </div>
    </div>`;
  document.getElementById('proj-detail').scrollIntoView({behavior:'smooth',block:'start'});
}

function piCommentWidget(key,email,dateStr,cmts){
  const cmt=cmts[key];
  return`<div class="pi-box">
    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px">💬 PI Comment</div>
    ${cmt?`<div class="cmt-saved"><div class="cmt-meta">Saved ${new Date(cmt.updatedAt).toLocaleString()}</div>${esc(cmt.text)}</div>`:''}
    <textarea class="ft" id="pcmt-${key}" placeholder="Feedback…" style="min-height:70px">${esc(cmt?.text||'')}</textarea>
    <div class="flex g2u mt2">
      <button class="btn btn-primary btn-sm" onclick="submitCmt('${key}','pcmt-${key}','pcmt-st-${key}')">💾 Save</button>
      <button class="btn btn-secondary btn-sm" onclick="emailCmt('${key}','pcmt-${key}','${esc(email)}','${esc(dateStr)}')">📧 Email</button>
      <span class="xs muted" id="pcmt-st-${key}"></span>
    </div>
  </div>`;
}

// ── CALENDAR ──
function renderCalendar(){
  const records=(DATA.records||[]).sort((a,b)=>b.date.localeCompare(a.date));
  const recMap={};records.forEach(r=>recMap[r.date]=r);
  const pg=document.getElementById('content');
  const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const td=today();
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  let cal='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>cal+=`<div class="cal-h">${d}</div>`);
  for(let i=0;i<first;i++)cal+=`<div class="cal-d dim"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasR=!!recMap[ds];const isTd=ds===td;
    cal+=`<div class="cal-d ${hasR?'has-rec':''} ${isTd?'today':''}" ${hasR?`onclick="scrollToRec('${ds}')" title="${esc((recMap[ds].summary||'').slice(0,60))}"`:''}>${d}</div>`;
  }

  const cmts=getCmts();
  pg.innerHTML=`
    <div class="g2">
      <div>
        <div class="card">
          <div class="card-title">${MN[mo]} ${yr}</div>
          <div class="cal-grid">${cal}</div>
          <p class="xs muted">Blue dates have records. Click to jump to record.</p>
        </div>
        <div class="card">
          <div class="card-title">Stats</div>
          <div class="g2">
            <div class="stat"><div class="stat-label">Total Records</div><div class="stat-val">${records.length}</div></div>
            <div class="stat"><div class="stat-label">This Month</div><div class="stat-val">${records.filter(r=>r.date.startsWith(`${yr}-${String(mo+1).padStart(2,'0')}`)).length}</div></div>
          </div>
        </div>
      </div>
      <div id="rec-list">
        ${records.map(r=>{
          const cmt=cmts[r.id];
          const linkedProjs=(r.projIds||[]).map(id=>DATA._projMap[id]).filter(Boolean);
          return`<div class="rec-card" id="rc-${r.date}">
            <div class="rec-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
              <div>
                <div style="font-weight:700;font-size:13px">${fd(r.date)}</div>
                <div class="xs muted">${esc((r.summary||'No summary').slice(0,70))}</div>
              </div>
              <div class="flex ic g2u">
                ${linkedProjs.slice(0,2).map(p=>`<span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block" title="${esc(p.name)}"></span>`).join('')}
                ${cmt?`<span style="color:var(--success);font-size:12px">💬</span>`:''}
                <span style="color:var(--text3)">▾</span>
              </div>
            </div>
            <div class="rec-body">
              ${linkedProjs.length?`<div class="flex g2u mb3" style="flex-wrap:wrap">${linkedProjs.map(p=>`<span class="badge" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}40">${esc(p.name)}</span>`).join('')}</div>`:''}
              ${r.summary?`<div class="mb3"><div class="sec-label">Summary</div><div class="sec-text">${esc(r.summary)}</div></div>`:''}
              ${r.problems?`<div class="mb3"><div class="sec-label">Problems</div><div class="sec-text">${esc(r.problems)}</div></div>`:''}
              ${r.nextSteps?`<div class="mb3"><div class="sec-label">Next Steps</div><div class="sec-text">${esc(r.nextSteps)}</div></div>`:''}
              ${r.elnDetail?`<div class="mb3"><div class="sec-label">Detailed Notes</div><div class="eln-content">${r.elnDetail}</div></div>`:''}
              ${piCommentWidget(r.id,DATA.email,fd(r.date),cmts)}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function scrollToRec(ds){
  const el=document.getElementById('rc-'+ds);
  if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  const body=el.querySelector('.rec-body');
  if(body)body.classList.add('open');
}

// ── ALL DATA ──
function renderAllData(){
  const files=DATA.sharedFiles||[];
  const pg=document.getElementById('content');

  const byType={images:[],docs:[],other:[]};
  files.forEach(f=>{
    if(f.type&&f.type.startsWith('image/'))byType.images.push(f);
    else if(f.type&&(f.type.includes('pdf')||f.type.includes('word')||f.type.includes('document')))byType.docs.push(f);
    else byType.other.push(f);
  });

  pg.innerHTML=`
    <div class="g4 mb4">
      <div class="stat"><div class="stat-label">Total Files</div><div class="stat-val">${files.length}</div></div>
      <div class="stat"><div class="stat-label">Images</div><div class="stat-val">${byType.images.length}</div></div>
      <div class="stat"><div class="stat-label">Documents</div><div class="stat-val">${byType.docs.length}</div></div>
      <div class="stat"><div class="stat-label">Other</div><div class="stat-val">${byType.other.length}</div></div>
    </div>

    ${!files.length?`<div class="card"><p class="muted">No files shared yet.</p></div>`:`
      <div class="tabs">
        <div class="tab on" onclick="switchTab('af-all','af-img','af-doc',this)">All (${files.length})</div>
        <div class="tab" onclick="switchTab('af-img','af-all','af-doc',this)">Images (${byType.images.length})</div>
        <div class="tab" onclick="switchTab('af-doc','af-all','af-img',this)">Documents (${byType.docs.length})</div>
      </div>
      <div id="af-all">${fileList(files)}</div>
      <div id="af-img" class="hidden">${fileList(byType.images)}</div>
      <div id="af-doc" class="hidden">${fileList(byType.docs)}</div>
    `}`;
}

function fileList(files){
  if(!files.length)return`<p class="sm muted p2">No files in this category.</p>`;
  return files.map(f=>`
    <div class="file-row">
      <div class="file-icon">${fileIcon(f.type)}</div>
      <div style="flex:1;min-width:0">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${fd(f.date)}${f.size?' · '+fmtSize(f.size):''}</div>
      </div>
      ${f.data
        ?`<a class="btn btn-primary btn-sm" href="${f.data}" download="${esc(f.name)}">⬇ Download</a>`
        :`<span class="xs muted" style="white-space:nowrap">Ask researcher for file</span>`
      }
    </div>`).join('');
}

// ── Comment helpers ──
function submitCmt(key,textareaId,statusId){
  const text=document.getElementById(textareaId)?.value.trim();
  if(!text){toast('Please write a comment first.');return;}
  saveCmtLocal(key,text);
  const st=document.getElementById(statusId);
  if(st)st.textContent='✅ Saved '+new Date().toLocaleTimeString();
  toast('Comment saved!');
}

function emailCmt(key,textareaId,email,label){
  const text=document.getElementById(textareaId)?.value.trim();
  if(!text){toast('Please write a comment first.');return;}
  saveCmtLocal(key,text);
  const sub=encodeURIComponent('PI Comment — '+label);
  const body=encodeURIComponent('Re: '+label+'\n\n'+text+'\n\n— '+((DATA&&DATA.pi)||'PI'));
  window.open('mailto:'+(email||'')+('?subject='+sub+'&body='+body));
}

function switchTab(show,...rest){
  // rest: hide ids OR (hide ids + el)
  const el=rest[rest.length-1];
  const isEl=typeof el==='object'&&el&&el.classList;
  const hideIds=isEl?rest.slice(0,-1):rest;
  document.getElementById(show)?.classList.remove('hidden');
  hideIds.forEach(id=>{if(typeof id==='string')document.getElementById(id)?.classList.add('hidden')});
  if(isEl){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on')}
}

load();
</script>
